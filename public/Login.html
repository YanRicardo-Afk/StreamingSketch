<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Pagina de Login</title>
    <link rel="stylesheet" href="paginas/Pagina-Login/styles/header.css">
    <link rel="stylesheet" href="paginas/Pagina-Login/styles/styles.css">
    <link rel="stylesheet" href="paginas/Pagina-Login/styles/formulario.css">
</head>
<body>
    <header>
        <nav id="navbar">
            <!-- Mudar essa parte mais tarde para a logo vetorizada + o nome -->
            <i class="fa-solid fa-cat" id="nav_logo">Sketch</i>
            <!-- Lista para que a pessoa navegue com facilidade na pagina -->
            <ul id="nav-list">
                <li class="nav-item active"> <a href="#home"> Inicio </a> </li>
                <li class="nav-item"> <a href="#planos"> Planos </a> </li>
                <li class="nav-item"> <a href="#perguntas"> Perguntas </a> </li>
            </ul>
            <!-- Coloquei essa div para separar os botões -->
            <div class="div-botao-assinar">
            <button class="btn-login"> Entrar <i class="fa-solid fa-cat" id="nav_logo"> </i> </button>

            <!-- Depois tenho que alterar ele para ser apenas um <a> com aparecia de botao e nao um botao -->
            <button class="btn-login"><a href="Cadastro.html"> Assinar </a><i class="fa-solid fa-cat" id="nav_logo"> </i></button>
            </div>

            <!-- Botao do mobile, que so vai aparecer no celular -->
            <button id="mobile-btn">
                <i class="fa-solid fa-bars"></i>
            </button>
        </nav>
        <!-- Parte que so vai aparecer no mobile, (tava funcionando mas parou preciso ver depois o pq) -->
        <div id="mobile-menu">
                <ul id="mobile-nav-list">
                <li class="nav-item"> <a href="#home"> Inicio </a> </li>
                <li class="nav-item"> <a href="#planos"> Planos </a> </li>
                <li class="nav-item"> <a href="#perguntas"> Perguntas </a> </li>
            </ul>
            <!-- Coloquei esses botao na aba tbm mas talvez eu remova ja q ele vai continuar aparecendo la em cima -->
            <button class="btn-login"> Entrar </button>
            <button class="btn-login"> Assinar </button>
            
        </div>
    </header>

    <main class="container-login">
            
            <form id="formLogin" action="/login" method="POST">

                <h2>Acesse sua conta</h2>
                <input type="email" name="email" placeholder="E-mail" required><br><br>
                <input type="password" name="senha" placeholder="Senha" required><br><br>
                <button type="submit">Entrar</button>


                <p>Novo por aqui? <a href="Cadastro.html">Crie uma conta</a></p>
           
           
            </form>     
    </main>


</body>
</html>
