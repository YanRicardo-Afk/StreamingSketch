<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch Assistir</title>
    <link rel="stylesheet" href="paginas/Pagina-Principal/style.css">
</head>
<body>
<div id="perfil-container">
    <h1>Configurações da Conta</h1>

    <div class="config-item">
        <label>Nome:</label>
        <span id="display-nome">...</span>
        <button onclick="abrirModal('nome')">Alterar</button>
    </div>

    <div class="config-item">
        <label>E-mail:</label>
        <span id="display-email">...</span>
        <button onclick="abrirModal('email')">Alterar</button>
    </div>

    <div class="config-item">
        <label>Plano:</label>
        <span id="display-plano">...</span>
        <button onclick="abrirModal('plano')">Mudar Plano</button>
    </div>
</div>

<div id="modal-editar" class="modal">
    <div class="modal-conteudo">
        <h3 id="modal-titulo">Editar</h3>
        
        <input type="text" id="input-geral" style="display: none;">

        <select id="select-plano" style="display: none;">
            <option value="free">Free</option>
            <option value="pro">Pro</option>
        </select>

        <div class="modal-botoes">
            <button onclick="fecharModal()">Cancelar</button>
            <button id="btn-salvar" class="btn-confirmar">Salvar</button>
        </div>
    </div>
</div>

    <script src="paginas/Pagina-Principal/paginaPrincipal.js"></script>
</body>
</html>
