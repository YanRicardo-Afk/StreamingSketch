<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch Assistir</title>
</head>
<body>
 <div id="perfil-container">
    <h1>Configurações da Conta</h1>

    <div class="config-item">
        <label>Nome:</label>
        <span id="display-nome">Carregando...</span>
        <button onclick="editar('nome')">Alterar</button>
    </div>

    <div class="config-item">
        <label>E-mail:</label>
        <span id="display-email">Carregando...</span>
        <button onclick="editar('email')">Alterar</button>
    </div>

    <div class="config-item">
        <label>Plano Atual:</label>
        <span id="display-plano">Carregando...</span>
        <button onclick="editar('plano')">Mudar Plano</button>
    </div>

    <div class="config-item">
        <label>Segurança:</label>
        <span>********</span>
        <button onclick="editar('senha')">Alterar Senha</button>
    </div>
</div>

    <script src="paginas/Pagina-Principal/paginaPrincipal.js"></script>
</body>
</html>
