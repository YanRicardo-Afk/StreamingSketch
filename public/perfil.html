<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch Assistir</title>
    <link rel="stylesheet" href="paginas/Pagina-Perfil/style.css">
</head>
<body>
<div id="perfil-container">
    <h1>Configurações da Conta</h1>

    <div class="config-item">
        <label>Nome:</label>
        <span id="display-nome">...</span>
        <button id="btn-edit-nome">Alterar</button>
    </div>

    <div class="config-item">
        <label>E-mail:</label>
        <span id="display-email">...</span>
        <button id="btn-edit-email">Alterar</button>
    </div>

    <div class="config-item">
        <label>Plano:</label>
        <span id="display-plano">...</span>
        <button id="btn-edit-plano">Mudar Plano</button>
    </div>
</div>

<div id="modal-editar" class="modal">
    <div class="modal-conteudo">
        <h3 id="modal-titulo">Editar</h3>
        
        <input type="text" id="input-geral" style="display: none;">

        <select id="select-plano" style="display: none;">
            <option value="free">Free</option>
            <option value="pro">Pro</option>
        </select>

        <div class="modal-botoes">
            <button id="btn-cancelar">Cancelar</button>
            <button id="btn-salvar" class="btn-confirmar">Salvar</button>
        </div>
    </div>
</div>

<div class="acoes-perigosas" style="margin-top: 50px; border-top: 1px solid #444; padding-top: 20px;">
    <button id="btn-logout" style="background: #444; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">Sair da Conta</button>
    
    <button id="btn-excluir" style="background: #9a5353; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px;">Excluir Conta</button>
</div>

    <script src="paginas/Pagina-Perfil/paginaPerfil.js"></script>
</body>
</html>
