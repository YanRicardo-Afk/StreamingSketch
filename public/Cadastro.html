<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="paginas/Pagina-Cadastro/styles/style.css">
    <link rel="stylesheet" href="paginas/Pagina-Cadastro/styles/header.css">
    <link rel="stylesheet" href="paginas/styles/home.css">
    <link rel="stylesheet" href="paginas/Pagina-Cadastro/styles/formulario.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <title>Sketch</title>

</head>
<body>
<div class="main-wrapper">
        <nav class="navbar">
            <div class="nav-logo">
                <a href="index.html">
                    <img src="assents/SketchParaUsarComTraçado.png" alt="Logo">
                </a>
            </div>

            <button class="menu-toggle" aria-label="Abrir menu" id="menu-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <div class="nav-actions" id="nav-actions">
                <a href="Login.html" class="btn btn-login" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">Entrar</a>
                <a href="Cadastro.html" class="btn btn-register" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">Cadastrar</a>
            </div>
        </nav>

<main class="container-cadastro">
    <!-- Novo contêiner unificado do formulário para agrupar a barra de progresso -->
    <div class="cadastro-box">
        
        <!-- MICROINTERAÇÃO: Barra de Progresso Superior -->
        <div class="progress-container">
            <div class="progress-bar" id="barra-progresso"></div>
            <div class="steps-text">
                <span id="step-indicator">Etapa 1 de 2</span>
            </div>
        </div>

        <form id="formCadastro" method="POST" action="/cadastrar">
            
            <section id="etapa-dados">
                <h2>Crie sua conta</h2>
                <p>Falta pouco para começar sua maratona!</p>

                <div class="campo">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
                    <span class="erro-texto" id="erro-nome"></span>
                </div>

                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="text" id="email" name="email" placeholder="seu@email.com">
                    <span class="erro-texto" id="erro-email"></span>
                </div>

                <div class="campo campo-senha">
                    <label for="senha">Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="senha" name="senha" placeholder="Crie uma senha">
                        <i class="fa-regular fa-eye toggle-password" data-target="senha"></i>
                    </div>
                    <span class="erro-texto" id="erro-senha"></span>
                </div>

                <div class="campo campo-senha">
                    <label for="confirma-senha">Confirmar Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirma-senha" placeholder="Repita a senha">
                        <i class="fa-regular fa-eye toggle-password" data-target="confirma-senha"></i>
                    </div>
                    <span class="erro-texto" id="erro-confirma"></span>
                </div>

                <button type="button" class="btn-proximo">Próximo: Escolher Plano</button>
            </section>

            <section id="etapa-planos">
                <h2>Escolha seu plano</h2>
                <span class="erro-texto text-center" id="erro-plano" style="display:block; margin-bottom:10px;"></span>
                
                <div class="cards-container">
                    <div class="card-plano" id="plano-free">
                        <h3>Free</h3>
                        <ul>
                            <li>Qualidade 480p</li>
                            <li>Com anúncios</li>
                            <li>Acesso limitado</li>
                        </ul>
                        <span class="preco">Grátis</span>
                        <input type="radio" name="plano" value="free" id="radio-free" hidden>
                    </div>

                    <div class="card-plano" id="plano-pro">
                        <h3>Pro</h3>
                        <ul>
                            <li>Qualidade Full HD</li>
                            <li>Sem anúncios</li>
                            <li>Acesso total</li>
                        </ul>
                        <span class="preco">R$ 9,90/mês</span>
                        <input type="radio" name="plano" value="pro" id="radio-pro" hidden>
                    </div>
                </div>

                <div id="area-pagamento" style="display: none; margin-top: 20px;">
                    <h3>Dados de Pagamento (Premium)</h3>
                    <div class="campo">
                        <label>Número do Cartão</label>
                        <input type="text" name="numero_cartao" id="num-cartao" placeholder="0000 0000 0000 0000">
                        <span class="erro-texto" id="erro-cartao"></span>
                    </div>
                    <div class="campo">
                        <label>CPF</label>
                        <input type="text" name="cpf" id="cpf-input" placeholder="000.000.000-00">
                        <span class="erro-texto" id="erro-cpf"></span>
                    </div>
                    <div class="campo campo-senha">
                        <label>Senha do Cartão</label>
                        <div class="input-wrapper">
                            <input type="password" name="senha_cartao" id="senha-cartao" placeholder="****">
                            <i class="fa-regular fa-eye toggle-password" data-target="senha-cartao"></i>
                        </div>
                        <span class="erro-texto" id="erro-senha-cartao"></span>
                    </div>
                </div>
                

                <div class="botoes-final">
                    <button type="button" class="btn-voltar">Voltar</button>
                    <button type="submit" class="btn-finalizar">Finalizar Cadastro</button>
                </div>
            </section>

        </form>
    </div>
</main>
    <script src="paginas/Pagina-Cadastro/Javascript/script.js"></script>
    <script src="paginas/Script/script.js"></script>
</body>
</html>
